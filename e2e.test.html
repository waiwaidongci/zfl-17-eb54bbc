<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>端到端回归测试 - 胶片分镜条核对台</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #11111b;
        color: #cdd6f4;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .test-header {
        background: #1e1e2e;
        border-bottom: 1px solid #313244;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
      }
      .test-header h1 {
        margin: 0;
        font-size: 18px;
        color: #89b4fa;
      }
      .summary-cards {
        display: flex;
        gap: 10px;
      }
      .summary-card {
        background: #313244;
        padding: 6px 14px;
        border-radius: 6px;
        min-width: 70px;
        text-align: center;
      }
      .summary-card .num { font-size: 18px; font-weight: 700; }
      .summary-card .label { font-size: 11px; color: #a6adc8; }
      .card-pass .num { color: #a6e3a1; }
      .card-fail .num { color: #f38ba8; }
      .card-total .num { color: #89b4fa; }
      .toolbar {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }
      .toolbar button {
        background: #45475a;
        color: #cdd6f4;
        border: none;
        padding: 7px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .toolbar button:hover { background: #585b70; }
      .toolbar button.primary { background: #89b4fa; color: #1e1e2e; font-weight: 600; }
      .toolbar button.primary:hover { background: #b4befe; }
      .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

      .test-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .test-sidebar {
        width: 380px;
        background: #1e1e2e;
        border-right: 1px solid #313244;
        overflow-y: auto;
        padding: 12px;
        flex-shrink: 0;
      }

      .test-sidebar details {
        background: #313244;
        border-radius: 6px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .test-sidebar summary {
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 600;
        user-select: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }
      .test-sidebar summary:hover { background: #45475a; }
      .suite-meta { font-size: 11px; font-weight: 400; display: flex; gap: 10px; }
      .suite-pass { color: #a6e3a1; }
      .suite-fail { color: #f38ba8; }

      .tests { padding: 4px 12px 10px; }
      .test-item {
        padding: 6px 10px;
        border-radius: 4px;
        margin-bottom: 3px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .test-pass {
        background: rgba(166, 227, 161, 0.08);
        border-left: 3px solid #a6e3a1;
      }
      .test-fail {
        background: rgba(243, 139, 168, 0.08);
        border-left: 3px solid #f38ba8;
      }
      .test-name { font-weight: 500; }
      .test-pass .test-name { color: #a6e3a1; }
      .test-fail .test-name { color: #f38ba8; }
      .error-msg {
        margin-top: 4px;
        padding: 6px 10px;
        background: rgba(243, 139, 168, 0.12);
        border-radius: 3px;
        color: #f38ba8;
        white-space: pre-wrap;
        font-size: 11px;
      }

      .test-preview {
        flex: 1;
        position: relative;
        background: #fff;
      }
      .test-preview iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .preview-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #6c7086;
        font-size: 14px;
      }

      .hint-bar {
        background: #f9e2af;
        color: #313244;
        padding: 8px 16px;
        font-size: 12px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .hint-bar strong { font-weight: 600; }
      .hint-bar .spacer { flex: 1; }
      .hint-bar button {
        background: #313244;
        color: #f9e2af;
        border: none;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
      }
      .hint-bar button:hover { background: #45475a; }

      .console-log {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 150px;
        overflow-y: auto;
        background: #11111b;
        color: #a6adc8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        padding: 8px 12px;
        border-top: 1px solid #313244;
        display: none;
      }
      .console-log.visible { display: block; }
      .console-log .log-line { padding: 2px 0; }
      .console-log .log-info { color: #89b4fa; }
      .console-log .log-warn { color: #f9e2af; }
      .console-log .log-error { color: #f38ba8; }
      .console-log .log-success { color: #a6e3a1; }
    </style>
  </head>
  <body>
    <div class="test-header">
      <h1>🧪 端到端回归测试</h1>
      <div class="summary-cards">
        <div class="summary-card card-total">
          <div class="num" id="totalCount">—</div>
          <div class="label">总用例</div>
        </div>
        <div class="summary-card card-pass">
          <div class="num" id="passCount">—</div>
          <div class="label">通过</div>
        </div>
        <div class="summary-card card-fail">
          <div class="num" id="failCount">—</div>
          <div class="label">失败</div>
        </div>
        <div class="summary-card">
          <div class="num" id="duration">—</div>
          <div class="label">耗时(ms)</div>
        </div>
      </div>
      <div class="toolbar">
        <button class="primary" id="runBtn" disabled>▶ 运行测试</button>
        <button id="expandBtn">展开全部</button>
        <button id="collapseBtn">折叠全部</button>
        <button id="showFailBtn">仅显示失败</button>
        <button id="consoleBtn">控制台</button>
      </div>
    </div>

    <div class="hint-bar" id="hintBar">
      <span>⚠️ <strong>注意：</strong>测试会临时替换本地存储数据，测试完成后自动恢复。请勿在测试期间刷新应用页面。</span>
      <span class="spacer"></span>
      <span id="statusText">等待应用加载...</span>
    </div>

    <div class="test-body">
      <div class="test-sidebar">
        <div id="report"></div>
      </div>
      <div class="test-preview">
        <div class="preview-loading" id="loadingText">正在加载应用...</div>
        <iframe id="appFrame" src="index.html" onload="onAppLoaded()"></iframe>
      </div>
    </div>

    <div class="console-log" id="consoleLog"></div>

    <script>
    // ============================================================
    //  控制台日志工具
    // ============================================================
    const consoleLogEl = document.getElementById("consoleLog");
    function log(msg, type = "info") {
      const line = document.createElement("div");
      line.className = "log-line log-" + type;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      consoleLogEl.appendChild(line);
      consoleLogEl.scrollTop = consoleLogEl.scrollHeight;
      console.log(msg);
    }

    document.getElementById("consoleBtn").addEventListener("click", function () {
      consoleLogEl.classList.toggle("visible");
    });

    // ============================================================
    //  localStorage 备份与恢复
    // ============================================================
    const STORAGE_KEYS_PREFIX = "zfl17";
    let storageBackup = {};
    let appWindow = null;
    let appLoaded = false;

    function backupStorage() {
      storageBackup = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(STORAGE_KEYS_PREFIX)) {
          storageBackup[key] = localStorage.getItem(key);
        }
      }
      log(`已备份 ${Object.keys(storageBackup).length} 条本地存储数据`, "info");
    }

    function restoreStorage() {
      const existingKeys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(STORAGE_KEYS_PREFIX)) {
          existingKeys.push(key);
        }
      }
      existingKeys.forEach(k => localStorage.removeItem(k));

      Object.entries(storageBackup).forEach(([k, v]) => {
        localStorage.setItem(k, v);
      });
      log(`已恢复 ${Object.keys(storageBackup).length} 条本地存储数据`, "success");
    }

    function clearTestStorage() {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(STORAGE_KEYS_PREFIX)) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(k => localStorage.removeItem(k));
      log("已清空测试相关本地存储", "warn");
    }

    // ============================================================
    //  轻量测试框架
    // ============================================================
    const suites = [];
    let currentSuite = null;

    function describe(name, fn) {
      const suite = { name, tests: [], beforeFns: [], afterFns: [] };
      suites.push(suite);
      currentSuite = suite;
      fn();
      currentSuite = null;
    }

    function beforeEach(fn) {
      if (currentSuite) currentSuite.beforeFns.push(fn);
    }

    function afterEach(fn) {
      if (currentSuite) currentSuite.afterFns.push(fn);
    }

    function it(name, fn) {
      if (currentSuite) currentSuite.tests.push({ name, fn });
    }

    function deepEqual(a, b) {
      if (a === b) return true;
      if (typeof a !== typeof b) return false;
      if (a === null || b === null) return a === b;
      if (a instanceof Date && b instanceof Date) return a.getTime() === b.getTime();
      if (a instanceof RegExp && b instanceof RegExp) return a.source === b.source && a.flags === b.flags;
      if (typeof a !== "object") return false;
      if (Array.isArray(a) !== Array.isArray(b)) return false;
      const keysA = Object.keys(a);
      const keysB = Object.keys(b);
      if (keysA.length !== keysB.length) return false;
      for (const k of keysA) {
        if (!keysB.includes(k)) return false;
        if (!deepEqual(a[k], b[k])) return false;
      }
      return true;
    }

    function formatValue(v) {
      if (v === undefined) return "undefined";
      if (v === null) return "null";
      if (typeof v === "string") return JSON.stringify(v);
      if (typeof v === "number" || typeof v === "boolean") return String(v);
      if (v instanceof RegExp) return v.toString();
      try {
        return JSON.stringify(v, null, 2);
      } catch (e) {
        return String(v);
      }
    }

    const assert = {
      equal(actual, expected, msg) {
        if (actual !== expected) {
          throw new Error(
            (msg || "equal 断言失败") +
            `\n  期望值: ${formatValue(expected)}\n  实际值: ${formatValue(actual)}`
          );
        }
      },
      notEqual(actual, expected, msg) {
        if (actual === expected) {
          throw new Error(
            (msg || "notEqual 断言失败") +
            `\n  期望值不等于: ${formatValue(expected)}\n  实际值: ${formatValue(actual)}`
          );
        }
      },
      deepEqual(actual, expected, msg) {
        if (!deepEqual(actual, expected)) {
          throw new Error(
            (msg || "deepEqual 断言失败") +
            `\n  期望值: ${formatValue(expected)}\n  实际值: ${formatValue(actual)}`
          );
        }
      },
      true(val, msg) {
        if (val !== true) {
          throw new Error((msg || "true 断言失败") + `\n  实际值: ${formatValue(val)}`);
        }
      },
      false(val, msg) {
        if (val !== false) {
          throw new Error((msg || "false 断言失败") + `\n  实际值: ${formatValue(val)}`);
        }
      },
      ok(val, msg) {
        if (!val) {
          throw new Error((msg || "ok 断言失败") + `\n  实际值: ${formatValue(val)}`);
        }
      },
      throws(fn, msg) {
        let thrown = false;
        try { fn(); } catch (e) { thrown = true; }
        if (!thrown) throw new Error(msg || "throws 断言失败：函数未抛出异常");
      },
      includes(arrOrStr, item, msg) {
        const found = typeof arrOrStr === "string" ? arrOrStr.includes(item) : arrOrStr.indexOf(item) !== -1;
        if (!found) {
          throw new Error(
            (msg || "includes 断言失败") +
            `\n  未找到: ${formatValue(item)}\n  容器: ${formatValue(arrOrStr)}`
          );
        }
      },
      arrayIncludes(arr, predicate, msg) {
        if (!arr.some(predicate)) {
          throw new Error((msg || "arrayIncludes 断言失败") + `\n  数组: ${formatValue(arr)}`);
        }
      },
      length(arr, n, msg) {
        if (arr.length !== n) {
          throw new Error(
            (msg || "length 断言失败") +
            `\n  期望长度: ${n}\n  实际长度: ${arr.length}`
          );
        }
      }
    };

    // ============================================================
    //  测试辅助函数
    // ============================================================
    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getAppWindow() {
      return appWindow;
    }

    function getAppDocument() {
      return appWindow.document;
    }

    function $(selector) {
      return getAppDocument().querySelector(selector);
    }

    function $$(selector) {
      return Array.from(getAppDocument().querySelectorAll(selector));
    }

    function getState() {
      return getAppWindow().state;
    }

    function getActiveReel() {
      return getAppWindow().getActiveReel();
    }

    function renderAll() {
      getAppWindow().renderAll();
    }

    // ============================================================
    //  测试用例
    // ============================================================

    // ---------- 1. 应用初始化与默认数据 ----------
    describe("应用初始化", function () {
      it("应用加载完成且有默认胶片卷", function () {
        const state = getState();
        assert.ok(state, "state 应存在");
        assert.ok(Array.isArray(state.reels), "reels 应为数组");
        assert.ok(state.reels.length > 0, "至少有一个胶片卷");
        assert.ok(state.activeReelId, "应有 activeReelId");
      });

      it("默认胶片卷有示例片段", function () {
        const reel = getActiveReel();
        assert.ok(reel, "当前胶片卷应存在");
        assert.ok(Array.isArray(reel.segments), "segments 应为数组");
        assert.ok(reel.segments.length > 0, "应有示例片段");
        assert.ok(reel.segments.length >= 3, "至少有3个示例片段");
      });

      it("默认模板存在", function () {
        const state = getState();
        assert.ok(Array.isArray(state.templates), "templates 应为数组");
        assert.ok(state.templates.length >= 2, "至少有2个默认模板");
      });

      it("风险规则加载正常", function () {
        const w = getAppWindow();
        assert.ok(w.calculateSegmentRisk, "calculateSegmentRisk 应存在");
        assert.ok(w.getCurrentRiskRules, "getCurrentRiskRules 应存在");
        const rules = w.getCurrentRiskRules();
        assert.ok(rules.shift, "应有 shift 规则");
        assert.ok(rules.damage, "应有 damage 规则");
        assert.ok(rules.levels.length > 0, "应有风险等级");
      });

      it("批量导入模块加载正常", function () {
        const w = getAppWindow();
        assert.ok(w.BatchImport, "BatchImport 模块应存在");
        assert.ok(w.BatchImport.parseCsvText, "parseCsvText 应存在");
        assert.ok(w.BatchImport.validateImportRows, "validateImportRows 应存在");
      });

      it("历史记录管理器初始化正常", function () {
        const w = getAppWindow();
        assert.ok(w.appHistory, "history 应存在");
        assert.equal(typeof w.appHistory.undo, "function", "应有 undo 方法");
        assert.equal(typeof w.appHistory.redo, "function", "应有 redo 方法");
      });

      it("快照管理器初始化正常", function () {
        const w = getAppWindow();
        assert.ok(w.snapshotManager, "snapshotManager 应存在");
        assert.equal(typeof w.snapshotManager.create, "function", "应有 create 方法");
        assert.equal(typeof w.snapshotManager.restore, "function", "应有 restore 方法");
        assert.equal(typeof w.snapshotManager.getList, "function", "应有 getList 方法");
      });
    });

    // ---------- 2. 新增片段 ----------
    describe("关键路径 1：新增片段", function () {
      let initialCount = 0;

      beforeEach(function () {
        initialCount = getActiveReel().segments.length;
      });

      it("通过表单提交新增片段", function () {
        const w = getAppWindow();
        const doc = getAppDocument();

        doc.getElementById("codeInput").value = "TEST-001";
        doc.getElementById("durationInput").value = "15";
        doc.getElementById("shiftInput").value = "偏红";
        doc.getElementById("damageInput").value = "轻微划痕";
        doc.getElementById("noteInput").value = "测试新增片段";

        const reel = getActiveReel();
        const cmd = new w.AddSegmentCommand(reel.id, {
          code: "TEST-001",
          duration: 15,
          shift: "偏红",
          damage: "轻微划痕",
          note: "测试新增片段",
          thumb: "",
        });
        w.appHistory.execute(cmd);
        w.renderAll();

        assert.equal(reel.segments.length, initialCount + 1, "片段数应增加1");

        const lastSeg = reel.segments[reel.segments.length - 1];
        assert.equal(lastSeg.code, "TEST-001");
        assert.equal(lastSeg.duration, 15);
        assert.equal(lastSeg.shift, "偏红");
        assert.equal(lastSeg.damage, "轻微划痕");
        assert.equal(lastSeg.note, "测试新增片段");
      });

      it("新增片段后风险评分正确计算", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const seg = reel.segments.find(s => s.code === "TEST-001");
        assert.ok(seg, "应找到测试片段");

        const risk = w.calculateSegmentRisk(seg);
        assert.ok(risk.score > 0, "应有风险分值");
        assert.ok(risk.label, "应有风险等级标签");
        assert.ok(risk.reasons.length > 0, "应有风险原因");
      });

      it("新增片段后统计数据更新", function () {
        const w = getAppWindow();
        const countEl = $("#segmentCount");
        assert.ok(countEl, "segmentCount 元素应存在");
        assert.ok(countEl.textContent.trim().length > 0, "应有片段数显示");
      });

      it("撤销新增片段", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const beforeCount = reel.segments.length;

        w.appHistory.undo();
        w.renderAll();

        assert.equal(reel.segments.length, beforeCount - 1, "撤销后片段数应减少");
      });

      it("重做新增片段", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const beforeCount = reel.segments.length;

        w.appHistory.redo();
        w.renderAll();

        assert.equal(reel.segments.length, beforeCount + 1, "重做后片段数应恢复");
      });
    });

    // ---------- 3. 批量导入 CSV ----------
    describe("关键路径 2：批量导入 CSV", function () {
      it("parseCsvText 能正确解析 CSV 文本", function () {
        const w = getAppWindow();
        const csvText = `片段编号,秒数,颜色偏移,破损情况,备注
TEST-B01,8,正常,完好,批量导入测试1
TEST-B02,12,偏红,轻微划痕,批量导入测试2
TEST-B03,5,褪色,齿孔破损,批量导入测试3`;

        const rows = w.BatchImport.parseCsvText(csvText);
        assert.equal(rows.length, 3, "应解析出3行数据");
        assert.equal(rows[0].fields[0], "TEST-B01");
        assert.equal(rows[0].fields[1], "8");
      });

      it("validateImportRows 能正确校验数据", function () {
        const w = getAppWindow();
        const rows = w.BatchImport.parseCsvText(`TEST-V01,10,正常,完好,有效行
TEST-V02,abc,偏红,轻微划痕,无效时长
TEST-V03,5,不存在的颜色,完好,无效颜色`);

        const { validated } = w.BatchImport.validateImportRows(rows, []);
        assert.equal(validated.length, 3, "应返回3条校验结果");
        assert.equal(validated[0].status, "ok", "第1行应为有效");
        assert.equal(validated[1].status, "error", "第2行应为错误");
        assert.equal(validated[2].status, "error", "第3行应为错误");
      });

      it("批量导入后片段数正确增加", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const beforeCount = reel.segments.length;

        const testSegments = [
          { id: w.crypto.randomUUID(), code: "IMPORT-01", duration: 10, shift: "正常", damage: "完好", note: "导入测试1", thumb: "" },
          { id: w.crypto.randomUUID(), code: "IMPORT-02", duration: 20, shift: "偏黄", damage: "轻微划痕", note: "导入测试2", thumb: "" },
          { id: w.crypto.randomUUID(), code: "IMPORT-03", duration: 5, shift: "褪色", damage: "齿孔破损", note: "导入测试3", thumb: "" }
        ];

        const cmd = new w.BatchImportCommand(reel.id, testSegments, reel.segments.length);
        w.appHistory.execute(cmd);

        assert.equal(reel.segments.length, beforeCount + 3, "应增加3个片段");
      });

      it("批量导入后撤销可恢复", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const beforeCount = reel.segments.length;

        w.appHistory.undo();

        assert.ok(reel.segments.length < beforeCount, "撤销后片段数应减少");
      });

      it("重复编号检测正确", function () {
        const w = getAppWindow();
        const reel = getActiveReel();
        const existingCode = reel.segments[0]?.code || "A-001";

    });

    // ============================================================
    //  测试运行器 & 报告渲染
    // ============================================================
    let testResults = [];

    function renderReport() {
      const reportEl = document.getElementById("report");
      reportEl.innerHTML = "";

      let totalPass = 0, totalFail = 0;
      const startTs = performance.now();
      const results = [];

      for (const suite of suites) {
        const suiteResult = { name: suite.name, tests: [], pass: 0, fail: 0 };
        for (const test of suite.tests) {
          try {
            for (const bf of suite.beforeFns) bf();
            test.fn();
            for (const af of suite.afterFns) af();
            suiteResult.tests.push({ name: test.name, pass: true });
            suiteResult.pass++;
            totalPass++;
          } catch (e) {
            for (const af of suite.afterFns) { try { af(); } catch (_) {} }
            suiteResult.tests.push({ name: test.name, pass: false, error: e.message });
            suiteResult.fail++;
            totalFail++;
          }
        }
        results.push(suiteResult);
      }
      const elapsed = performance.now() - startTs;

      testResults = results;

      const total = totalPass + totalFail;
      document.getElementById("totalCount").textContent = total;
      document.getElementById("passCount").textContent = totalPass;
      document.getElementById("failCount").textContent = totalFail;
      document.getElementById("duration").textContent = elapsed.toFixed(0);

      for (const sr of results) {
        const details = document.createElement("details");
        details.open = sr.fail > 0;
        const allPass = sr.fail === 0;

        const meta = document.createElement("span");
        meta.className = "suite-meta";
        meta.innerHTML = `<span class="${allPass ? "suite-pass" : "suite-fail"}">${sr.pass} 通过</span>` +
          (sr.fail > 0 ? `<span class="suite-fail">${sr.fail} 失败</span>` : "");

        const summary = document.createElement("summary");
        summary.innerHTML = `<span>${sr.name}</span>`;
        summary.appendChild(meta);
        details.appendChild(summary);

        const testsDiv = document.createElement("div");
        testsDiv.className = "tests";
        for (const t of sr.tests) {
          const el = document.createElement("div");
          el.className = "test-item " + (t.pass ? "test-pass" : "test-fail");
          el.dataset.pass = t.pass;
          const name = document.createElement("div");
          name.className = "test-name";
          name.textContent = (t.pass ? "✓ " : "✗ ") + t.name;
          el.appendChild(name);
          if (!t.pass) {
            const err = document.createElement("div");
            err.className = "error-msg";
            err.textContent = t.error;
            el.appendChild(err);
          }
          testsDiv.appendChild(el);
        }
        details.appendChild(testsDiv);
        reportEl.appendChild(details);
      }

      log(`测试完成：${totalPass}/${total} 通过，${totalFail} 失败，耗时 ${elapsed.toFixed(0)}ms`,
        totalFail === 0 ? "success" : "error");

      document.getElementById("statusText").textContent =
        totalFail === 0 ? `✅ 全部 ${total} 项通过` : `❌ ${totalFail} 项失败`;
    }

    // ============================================================
    //  工具栏事件
    // ============================================================
    document.getElementById("runBtn").addEventListener("click", function () {
      if (!appLoaded) {
        alert("应用尚未加载完成，请稍候...");
        return;
      }
      log("开始运行测试...", "info");
      setTimeout(renderReport, 100);
    });

    document.getElementById("expandBtn").addEventListener("click", function () {
      document.querySelectorAll("#report details").forEach(d => d.open = true);
    });

    document.getElementById("collapseBtn").addEventListener("click", function () {
      document.querySelectorAll("#report details").forEach(d => d.open = false);
    });

    document.getElementById("showFailBtn").addEventListener("click", function () {
      const btn = this;
      const onlyFail = btn.dataset.on !== "1";
      btn.dataset.on = onlyFail ? "1" : "0";
      btn.textContent = onlyFail ? "显示全部" : "仅显示失败";
      document.querySelectorAll("#report details").forEach(d => {
        const hasFail = d.querySelector(".test-fail");
        d.style.display = onlyFail && !hasFail ? "none" : "";
        if (onlyFail && hasFail) d.open = true;
      });
    });

    // ============================================================
    //  页面卸载时恢复数据
    // ============================================================
    window.addEventListener("beforeunload", function () {
      if (Object.keys(storageBackup).length > 0) {
        restoreStorage();
      }
    });

    // ============================================================
    //  应用加载完成回调
    // ============================================================
    const APP_READY_MAX_RETRIES = 60;
    const APP_READY_INTERVAL_MS = 250;

    function pollAppReady(callback, retries = 0) {
      const iframe = document.getElementById("appFrame");
      if (!iframe || !iframe.contentWindow) {
        if (retries < APP_READY_MAX_RETRIES) {
          setTimeout(() => pollAppReady(callback, retries + 1), APP_READY_INTERVAL_MS);
        } else {
          log("应用加载超时：iframe window 不存在", "error");
          document.getElementById("statusText").textContent = "❌ 应用加载超时";
        }
        return;
      }
      const w = iframe.contentWindow;
      const ready = w.state
        && typeof w.appHistory !== "undefined"
        && typeof w.snapshotManager !== "undefined"
        && typeof w.calculateSegmentRisk === "function"
        && typeof w.BatchImport !== "undefined";

      if (ready) {
        appWindow = w;
        callback();
      } else if (retries < APP_READY_MAX_RETRIES) {
        if (retries % 4 === 0) {
          log(`等待应用就绪... (${retries * APP_READY_INTERVAL_MS / 1000}s)`, "warn");
        }
        setTimeout(() => pollAppReady(callback, retries + 1), APP_READY_INTERVAL_MS);
      } else {
        log(`应用加载超时：部分API未就绪`, "error");
        document.getElementById("statusText").textContent = "❌ 应用加载超时";
        document.getElementById("runBtn").disabled = false;
      }
    }

    function markAppReadyAndRun() {
      try {
        backupStorage();
        clearTestStorage();

        appLoaded = true;
        document.getElementById("loadingText").style.display = "none";
        document.getElementById("runBtn").disabled = false;
        document.getElementById("statusText").textContent = "✅ 应用已加载，正在初始化测试环境...";
        log("应用加载完成，初始化测试环境...", "success");

        setTimeout(() => {
          document.getElementById("statusText").textContent = "🧪 正在运行测试...";
          log("自动运行测试...", "info");
          try {
            renderReport();
          } catch (e) {
            log("测试运行异常: " + e.message, "error");
          }
        }, 500);
      } catch (e) {
        log("初始化失败: " + e.message, "error");
      }
    }

    function onAppLoaded() {
      log("iframe onload 触发，开始检测应用就绪状态...", "info");
      pollAppReady(markAppReadyAndRun);
    }
    </script>
  </body>
</html>
