<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>胶片分镜条核对台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">纸质放映胶片整理</p>
          <h1>胶片分镜条核对台</h1>
        </div>
        <div class="hero-stats">
          <div>
            <span>总时长</span>
            <strong id="totalDuration">0:00</strong>
          </div>
          <div>
            <span>破损片段</span>
            <strong id="damageCount">0</strong>
          </div>
          <div>
            <span>片段数</span>
            <strong id="segmentCount">0</strong>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <label>
          胶片卷
          <input id="reelTitle" type="text" placeholder="例：春日试映A卷" />
        </label>
        <label>
          颜色偏移
          <select id="colorFilter">
            <option value="all">全部</option>
            <option value="正常">正常</option>
            <option value="偏红">偏红</option>
            <option value="偏青">偏青</option>
            <option value="偏黄">偏黄</option>
            <option value="褪色">褪色</option>
          </select>
        </label>
        <label>
          搜索
          <input id="searchInput" type="search" placeholder="片段编号或备注" />
        </label>
        <button id="exportBtn">导出清单</button>
      </section>

      <section class="layout layout-with-templates">
        <aside class="panel">
          <div class="panel-head">
            <h2>录入片段</h2>
          </div>
          <div class="template-picker">
            <label>
              套用片段模板
              <div class="template-row">
                <select id="templateSelect">
                  <option value="">— 选择模板 —</option>
                </select>
                <button type="button" id="applyTemplateBtn" title="套用模板">套用</button>
              </div>
            </label>
          </div>
          <form id="segmentForm" class="segment-form">
            <label>
              片段编号
              <input id="codeInput" required placeholder="A-014" />
            </label>
            <label>
              时长秒数
              <input id="durationInput" required type="number" min="1" value="12" />
            </label>
            <label>
              颜色偏移
              <select id="shiftInput">
                <option value="正常">正常</option>
                <option value="偏红">偏红</option>
                <option value="偏青">偏青</option>
                <option value="偏黄">偏黄</option>
                <option value="褪色">褪色</option>
              </select>
            </label>
            <label>
              破损情况
              <select id="damageInput">
                <option value="完好">完好</option>
                <option value="轻微划痕">轻微划痕</option>
                <option value="齿孔破损">齿孔破损</option>
                <option value="接片松动">接片松动</option>
                <option value="需跳过">需跳过</option>
              </select>
            </label>
            <label>
              缩略图
              <input id="thumbInput" type="file" accept="image/*" />
            </label>
            <label>
              备注
              <textarea id="noteInput" rows="4" placeholder="试映前要留意的画面、接片或声音点"></textarea>
            </label>
            <button class="primary" type="submit">加入放映清单</button>
          </form>
        </aside>

        <aside class="panel template-panel">
          <div class="panel-head">
            <h2>片段模板</h2>
            <span id="templateCount">0 个</span>
          </div>
          <form id="templateForm" class="template-form">
            <label>
              模板名称
              <input id="templateNameInput" required placeholder="例：破损近景片" />
            </label>
            <label>
              默认时长秒数
              <input id="templateDurationInput" required type="number" min="1" value="12" />
            </label>
            <label>
              颜色偏移
              <select id="templateShiftInput">
                <option value="正常">正常</option>
                <option value="偏红">偏红</option>
                <option value="偏青">偏青</option>
                <option value="偏黄">偏黄</option>
                <option value="褪色">褪色</option>
              </select>
            </label>
            <label>
              破损情况
              <select id="templateDamageInput">
                <option value="完好">完好</option>
                <option value="轻微划痕">轻微划痕</option>
                <option value="齿孔破损">齿孔破损</option>
                <option value="接片松动">接片松动</option>
                <option value="需跳过">需跳过</option>
              </select>
            </label>
            <label>
              备注前缀
              <input id="templateNoteInput" placeholder="例：【留意】" />
            </label>
            <button class="primary" type="submit">保存为新模板</button>
          </form>
          <div id="templateList" class="template-list"></div>
        </aside>

        <section class="panel list-panel">
          <div class="panel-head">
            <h2>放映顺序</h2>
            <span>拖拽片段调整顺序</span>
          </div>
          <div id="segmentList" class="segment-list"></div>
        </section>

        <aside class="panel warning-panel">
          <div class="panel-head">
            <h2>问题片段概览</h2>
            <span class="read-only-badge">只读</span>
          </div>
          <p class="panel-hint">自动汇总所有破损与颜色偏移片段，便于快速浏览问题分布。如需追踪处理进度，请使用下方检查单。</p>
          <div id="warningList" class="warning-list"></div>
        </aside>
      </section>

      <section class="checklist-section">
        <div class="panel checklist-panel">
          <div class="panel-head">
            <h2>试映任务检查单</h2>
            <span id="checklistStats">0 / 0 项已完成</span>
          </div>
          <p class="panel-hint">待办追踪：破损和颜色偏移片段自动转为待办，支持手动添加临时检查项。勾选标记完成，状态自动保存，下次打开自动恢复。</p>
          <div class="checklist-legend">
            <span class="legend-item"><span class="legend-dot auto-dot"></span> 自动待办：系统生成，不可删除</span>
            <span class="legend-item"><span class="legend-dot manual-dot"></span> 临时检查项：手动添加，可删除</span>
          </div>
          <form id="checklistForm" class="checklist-form">
            <input id="checklistInput" type="text" placeholder="输入临时检查项，如：检查放映机镜头清洁度" required />
            <button class="primary" type="submit">添加</button>
          </form>
          <div class="checklist-groups">
            <div class="checklist-group">
              <h3 class="checklist-group-title">自动待办</h3>
              <div id="autoChecklist" class="checklist-list"></div>
            </div>
            <div class="checklist-group">
              <h3 class="checklist-group-title">临时检查项</h3>
              <div id="manualChecklist" class="checklist-list"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <aside class="drawer" id="segmentDrawer" aria-hidden="true">
      <div class="drawer-header">
        <h2>片段详情</h2>
        <button type="button" class="drawer-close" id="drawerClose" title="关闭">×</button>
      </div>
      <div class="drawer-content">
        <div class="drawer-thumb-section">
          <div class="drawer-thumb" id="drawerThumb">
            <div class="film-placeholder">—</div>
          </div>
          <label class="drawer-thumb-upload">
            <input type="file" id="drawerThumbInput" accept="image/*" />
            <span>更换缩略图</span>
          </label>
        </div>
        <form id="drawerForm" class="drawer-form">
          <label>
            片段编号
            <input id="drawerCode" required placeholder="A-014" />
          </label>
          <label>
            时长秒数
            <input id="drawerDuration" required type="number" min="1" value="12" />
          </label>
          <label>
            颜色偏移
            <select id="drawerShift">
              <option value="正常">正常</option>
              <option value="偏红">偏红</option>
              <option value="偏青">偏青</option>
              <option value="偏黄">偏黄</option>
              <option value="褪色">褪色</option>
            </select>
          </label>
          <label>
            破损情况
            <select id="drawerDamage">
              <option value="完好">完好</option>
              <option value="轻微划痕">轻微划痕</option>
              <option value="齿孔破损">齿孔破损</option>
              <option value="接片松动">接片松动</option>
              <option value="需跳过">需跳过</option>
            </select>
          </label>
          <label>
            完整备注
            <textarea id="drawerNote" rows="6" placeholder="试映前要留意的画面、接片或声音点"></textarea>
          </label>
          <div class="drawer-actions">
            <button type="submit" class="primary">保存修改</button>
            <button type="button" id="drawerDelete" class="drawer-delete-btn">删除此片段</button>
          </div>
        </form>
      </div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
